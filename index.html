<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5MRSVH1C6H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5MRSVH1C6H');
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>SyncScout v0.8.32</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="hideAllTagPopups()">
    
<header id="global-header">
    <div class="brand">
        SyncScout
        <span id="team-badge" class="team-badge"></span>
    </div>
    <div class="header-tools">
        <div id="catTabs" class="cat-tabs"></div>
        <select id="catSelectMobile" onchange="changeCategoryMobile(this.value)"></select>
        
        <div class="match-select-wrap">
            <select id="matchSelect" onchange="onMatchChange(this.value)">
                <option value="">Select Match...</option>
            </select>
            <button id="delete-match-btn" class="delete-match-btn" onclick="deleteMatch()" title="試合を削除" style="display:none;">🗑️</button>
        </div>

        <button class="add-match-btn" onclick="document.getElementById('add-match-modal').style.display='flex'">➕ Add Match</button>
        <div class="header-actions">
            <a href="sync_scout_manual.html" target="_blank" class="manual-btn">❓</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</header>

<div id="main-workspace">
    <div id="video-side">
        <div id="player-box" onclick="toggleOverlay()">
            <div id="player"></div>
            <div id="score-overlay" class="vid-ui">
                <div class="score-row home"><div class="sticky-bar"></div><div class="ov-team-box" id="ov-h-code">---</div><div class="ov-sets-box" id="ov-h-sets">0</div><div class="ov-points-box" id="ov-h-score">0</div></div>
                <div class="score-row away"><div class="sticky-bar"></div><div class="ov-team-box" id="ov-a-code">---</div><div class="ov-sets-box" id="ov-a-sets">0</div><div class="ov-points-box" id="ov-a-score">0</div></div>
            </div>
            <button class="video-nav-btn nav-prev vid-ui" onclick="event.stopPropagation(); playPrev()">◀</button>
            <button class="video-nav-btn nav-next vid-ui" onclick="event.stopPropagation(); playNext()">▶</button>
            <button class="seek-btn seek-back vid-ui" onclick="event.stopPropagation(); seekSeconds(-3)">-3s</button>
            <button class="seek-btn seek-repeat vid-ui" onclick="event.stopPropagation(); replayCurrentPlay()">↺</button>
            <button class="seek-btn seek-fwd vid-ui" onclick="event.stopPropagation(); seekSeconds(3)">+3s</button>
        </div>
        <canvas id="telestratorCanvas"></canvas>
        <div id="draw-toolbar">
            <div id="draw-tools">
                <button class="tool-btn active" onclick="setDrawTool('freehand')" id="tool-freehand">〰️</button>
                <button class="tool-btn" onclick="setDrawTool('arrow')" id="tool-arrow">↗️</button>
                <button class="tool-btn" onclick="setDrawTool('circle')" id="tool-circle">◯</button>
                <button class="tool-btn" onclick="setDrawTool('rect')" id="tool-rect">⬜</button>
            </div>
            
            <button class="draw-btn" onclick="undoDrawing()">↩️ Undo</button>
            
            <button class="draw-btn" onclick="clearCanvas()">Clear</button>
            <button class="draw-btn cancel" onclick="exitDrawMode()">Cancel</button>
            <button class="draw-btn save" onclick="saveDrawing()">Save (P)</button>
        </div>
    </div>

    <div id="control-side">
        <div class="mode-tabs">
            <button class="mode-tab active" id="btn-rally" onclick="setMode('rally')">Rallies</button>
            <button class="mode-tab" id="btn-player" onclick="setMode('player')">Individual</button>
            <button class="mode-tab" id="btn-stats" onclick="setMode('stats')">Table</button>
            <button class="mode-tab" id="btn-rotation" onclick="setMode('rotation')">Rotation</button>
        </div>

        <div class="filter-card" id="filterArea">
            <div id="rally-filters"><span class="filter-label">1. Server Team</span><select id="teamFilterRally" onchange="render()"><option value="">Both Teams</option></select></div>
            <div id="player-filters" style="display:none;">
                <div class="pf-grid">
                    <div class="pf-item">
                        <span class="filter-label">1. Team</span>
                        <select id="teamFilterPlayer" onchange="onTeamChangePlayer()"><option value="">Select Team</option></select>
                    </div>
                    <div class="pf-item">
                        <span class="filter-label">2. Player</span>
                        <select id="playerFilter" onchange="render()"><option value="">All Players</option></select>
                    </div>
                    <div class="pf-item">
                        <span class="filter-label">3. Skill</span>
                        <select id="skillFilter" onchange="render()"><option value="">All</option><option value="S">Serve</option><option value="R">Rec</option><option value="E">Set</option><option value="A">Attack</option><option value="B">Block</option><option value="D">Dig</option></select>
                    </div>
                    <div class="pf-item">
                        <span class="filter-label">4. Effect</span>
                        <select id="effectFilter" onchange="render()"><option value="">All</option><option value="#">Win (#)</option><option value="=">Error (=)</option><option value="+">Pos (+)</option><option value="-">Poor (-)</option><option value="!">Neutral (!)</option></select>
                    </div>
                </div>
            </div>
            <button class="toggle-search-btn" onclick="toggleSearchArea()"><span>🔍 Search Comments / Tags</span><span id="searchArrow">▼</span></button>
            <div class="search-container" id="searchArea">
                <input type="text" id="searchFilter" class="search-input" oninput="render()" placeholder="Keyword (e.g. #MB, #Good)">
                <div style="display:flex; gap:8px;"><button class="action-sm-btn" style="flex:1; background:#6c757d; color:white;" onclick="copyPlaylistLink()">Copy URL</button><button class="action-sm-btn" style="flex:1; background:var(--line-green); color:white;" onclick="sharePlaylist()">Share LINE</button></div>
            </div>
            <div style="display:flex; align-items:center; gap:8px; font-size:0.75rem; color:var(--text-muted); margin-top:12px;"><input type="checkbox" id="autoNext" checked style="width:auto; margin:0;"><label for="autoNext" style="cursor:pointer; font-weight:bold;">Auto-Skip</label></div>
        </div>
        <div id="instanceList"></div>
    </div>
</div>

<div id="add-match-modal" onclick="this.style.display='none'">
    <div class="add-match-content" onclick="event.stopPropagation()">
        <h3>➕ Add New Match</h3>
        <div class="fm-group">
            <label>Category</label>
            <input type="text" id="am-cat" list="existing-cats" placeholder="Select or type new category" autocomplete="off">
            <datalist id="existing-cats"></datalist>
        </div>
        <div class="fm-group"><label>YouTube URL</label><input type="text" id="am-yt" placeholder="https://youtu.be/..."></div>
        <div class="fm-group"><label>DVW File</label><input type="file" id="am-file" accept=".dvw"></div>
        <button class="add-btn-submit" id="am-submit-btn" onclick="submitNewMatch()">Upload & Save</button>
        <button class="add-btn-submit" style="background:#ccc; color:#333; margin-top:8px;" onclick="document.getElementById('add-match-modal').style.display='none'">Cancel</button>
    </div>
</div>

<button id="shortcut-btn" onclick="toggleShortcuts()">⌨️ Shortcuts</button>
<div id="shortcut-modal" onclick="toggleShortcuts()"><div class="modal-content" onclick="event.stopPropagation()"><h3>Keyboard Shortcuts</h3><ul><li><span>Next / Prev</span> <kbd>F</kbd> / <kbd>D</kbd></li><li><span>Repeat</span> <kbd>R</kbd></li><li><span>-2s / +2s</span> <kbd>←</kbd> / <kbd>→</kbd></li><li><span>Draw On/Save</span> <kbd>P</kbd></li><li><span>Undo Draw</span> <kbd>Ctrl+Z</kbd></li><li><span>Focus Note</span> <kbd>C</kbd></li><li><span>Submit</span> <kbd>Enter</kbd></li><li><span>Select Tag</span> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>Enter</kbd></li></ul><button class="close-modal-btn" onclick="toggleShortcuts()">Close</button></div></div>

<script src="app.js?v=1.0.0"></script>

</body>
</html>
